<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Moment with Julian</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --ink-soft: #4a4640;
    --ink-muted: #8a847c;
    --paper: #f7f4ef;
    --paper-warm: #ede9e2;
    --paper-deep: #ddd8cf;
    --accent: #7a6a52;
    --accent-light: #c4b49a;
    --danger-soft: #c4795a;
  }

  html, body {
    height: 100%;
    height: 100dvh;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
    overflow: hidden;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle texture overlay */
  #app::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 1;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── HOME ── */
  #home {
    gap: 0;
  }

  .home-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .julian-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.2rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .julian-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 400;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--accent-light);
    margin: 1.5rem auto;
  }

  .context-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-soft);
    text-align: center;
    min-height: 1.6em;
    margin-bottom: 3rem;
    transition: opacity 0.4s;
  }

  /* Mood pre */
  .mood-prompt {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    text-align: center;
    margin-bottom: 0.75rem;
  }

  .mood-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .mood-btn {
    font-size: 1.6rem;
    background: none;
    border: 1px solid transparent;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .mood-btn:hover { border-color: var(--accent-light); transform: scale(1.15); }
  .mood-btn.selected { border-color: var(--accent); background: var(--paper-warm); }

  .join-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 0.9rem 2.5rem;
    cursor: pointer;
    transition: all 0.25s;
    opacity: 0.4;
  }
  .join-btn.ready { opacity: 1; }
  .join-btn.ready:hover { background: var(--accent); }

  .session-counter {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Settings */
  .settings-toggle {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 18px;
    transition: color 0.2s;
    z-index: 10;
  }
  .settings-toggle:hover { color: var(--ink); }

  .settings-panel {
    position: fixed;
    bottom: 4rem;
    right: 1.5rem;
    background: var(--paper-warm);
    border: 1px solid var(--paper-deep);
    padding: 1.25rem 1.5rem;
    width: 240px;
    display: none;
    z-index: 20;
  }
  .settings-panel.open { display: block; }
  .settings-panel label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.3rem;
    margin-top: 0.75rem;
  }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input, .settings-panel select {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--paper-deep);
    padding: 0.4rem 0.6rem;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }

  /* ── SESSION ── */
  #session {
    width: 100%;
    max-width: 580px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0;
    justify-content: flex-start;
  }

  .session-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--paper-deep);
    flex-shrink: 0;
  }

  .session-julian {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--ink);
  }

  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }
  .timer-display.urgent { color: var(--danger-soft); }

  .end-btn {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .end-btn:hover { color: var(--ink); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--paper-deep); }

  .msg {
    max-width: 88%;
    animation: fadeUp 0.35s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-julian {
    align-self: flex-start;
  }

  .msg-user {
    align-self: flex-end;
    text-align: right;
  }

  .msg-sender {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.3rem;
  }

  .msg-bubble {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--ink);
  }

  .msg-user .msg-bubble {
    color: var(--ink-soft);
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0.5rem 0;
    align-self: flex-start;
  }
  .typing-indicator span {
    width: 5px; height: 5px;
    background: var(--accent-light);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Input area */
  .input-area {
    padding: 1rem 2rem 1.5rem;
    border-top: 1px solid var(--paper-deep);
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 1px solid var(--paper-deep);
    padding: 0.5rem 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--ink);
    outline: none;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-bottom-color: var(--accent); }
  .chat-input::placeholder { color: var(--ink-muted); font-style: italic; }

  .send-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 18px;
    padding: 0.3rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { color: var(--ink); }

  /* Extend banner */
  .extend-banner {
    background: var(--paper-warm);
    border-top: 1px solid var(--paper-deep);
    padding: 0.75rem 2rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .extend-banner.visible { display: flex; }
  .extend-banner p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink-soft);
  }
  .extend-yes, .extend-no {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem 0.6rem;
    transition: color 0.2s;
  }
  .extend-yes { color: var(--ink); }
  .extend-no { color: var(--ink-muted); }
  .extend-yes:hover { color: var(--accent); }

  /* ── CLOSE ── */
  #closing {
    gap: 1.5rem;
    max-width: 480px;
    text-align: center;
  }

  .closing-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .closing-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    line-height: 1.8;
    color: var(--ink);
    font-style: italic;
  }

  .mood-after-prompt {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 0.5rem;
  }

  .return-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: none;
    border: 1px solid var(--paper-deep);
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 0.5rem;
  }
  .return-btn:hover { border-color: var(--accent); color: var(--ink); }

  /* History */
  .history-toggle {
    position: fixed;
    bottom: 1.5rem;
    left: 1.5rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 18px;
    transition: color 0.2s;
    z-index: 10;
  }
  .history-toggle:hover { color: var(--ink); }

  .history-panel {
    position: fixed;
    bottom: 4rem;
    left: 1.5rem;
    background: var(--paper-warm);
    border: 1px solid var(--paper-deep);
    padding: 1.25rem 1.5rem;
    width: 280px;
    max-height: 320px;
    overflow-y: auto;
    display: none;
    z-index: 20;
  }
  .history-panel.open { display: block; }
  .history-panel h3 {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 1rem;
  }
  .history-item {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--paper-deep);
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:last-child { border-bottom: none; }
  .history-delta {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
  }
  .delta-pos { color: #6a8a5a; }
  .delta-neg { color: var(--danger-soft); }
  .delta-neu { color: var(--ink-muted); }
  .no-history {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-muted);
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="home-header">
      <div class="julian-name">Julian</div>
      <div class="julian-sub">A gratitude practice</div>
      <div class="divider"></div>
      <div class="context-line" id="context-line">Loading…</div>
    </div>

    <div class="mood-prompt">How are you feeling right now?</div>
    <div class="mood-row" id="mood-pre-row">
      <button class="mood-btn" data-val="1" title="Very low">😞</button>
      <button class="mood-btn" data-val="2" title="Low">😕</button>
      <button class="mood-btn" data-val="3" title="Neutral">😐</button>
      <button class="mood-btn" data-val="4" title="Good">🙂</button>
      <button class="mood-btn" data-val="5" title="Great">😊</button>
    </div>

    <button class="join-btn" id="join-btn" disabled>Join session</button>
    <div class="session-counter" id="session-counter"></div>
  </div>

  <!-- SESSION -->
  <div id="session" class="screen">
    <div class="session-top">
      <div class="session-julian">Julian</div>
      <div class="timer-display" id="timer">3:00</div>
      <button class="end-btn" id="end-btn">End session</button>
    </div>

    <div class="chat-area" id="chat-area"></div>

    <div class="extend-banner" id="extend-banner">
      <p>Time's up — shall we continue a little longer?</p>
      <div style="display:flex;gap:0.5rem;">
        <button class="extend-yes" id="extend-yes">2 more minutes</button>
        <button class="extend-no" id="extend-no">Close</button>
      </div>
    </div>

    <div class="input-area" id="input-area">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Share something you're grateful for…"></textarea>
      <button class="send-btn" id="send-btn" title="Send">↑</button>
    </div>
  </div>

  <!-- CLOSING -->
  <div id="closing" class="screen">
    <div class="closing-title">Session complete</div>
    <div class="closing-text" id="closing-text"></div>
    <div class="mood-after-prompt">How do you feel now?</div>
    <div class="mood-row" id="mood-post-row">
      <button class="mood-btn" data-val="1">😞</button>
      <button class="mood-btn" data-val="2">😕</button>
      <button class="mood-btn" data-val="3">😐</button>
      <button class="mood-btn" data-val="4">🙂</button>
      <button class="mood-btn" data-val="5">😊</button>
    </div>
    <button class="return-btn" id="return-btn">Return</button>
  </div>

  <!-- Settings -->
  <button class="settings-toggle" id="settings-toggle" title="Settings">⚙</button>
  <div class="settings-panel" id="settings-panel">
    <label>Anthropic API key</label>
    <input type="password" id="setting-apikey" placeholder="sk-ant-…" autocomplete="off" />
    <label>City</label>
    <input type="text" id="setting-city" value="Hong Kong" />
    <label>Latitude</label>
    <input type="number" id="setting-lat" value="22.3193" step="0.0001" />
    <label>Longitude</label>
    <input type="number" id="setting-lon" value="114.1694" step="0.0001" />
    <label>Timezone</label>
    <input type="text" id="setting-tz" value="Asia/Hong_Kong" placeholder="e.g. Europe/London" />
    <div id="apikey-status" style="font-size:11px;margin-top:0.6rem;color:var(--ink-muted);"></div>
  </div>

  <!-- History -->
  <button class="history-toggle" id="history-toggle" title="Session history">◷</button>
  <div class="history-panel" id="history-panel">
    <h3>Session history</h3>
    <div id="history-list"></div>
  </div>

</div>

<script>
const MOODS = ['','😞','😕','😐','🙂','😊'];
const MOOD_LABELS = ['','Very low','Low','Neutral','Good','Great'];
let moodPre = 0, moodPost = 0;
let timerInterval = null;
let secondsLeft = 180;
let sessionExtended = false;
let conversationHistory = [];
let sessionStartTime = null;
let isJulianTyping = false;
let sessionActive = false;
let weatherCache = null;
let contextString = '';

// ── Storage ──
function getSessions() {
  try { return JSON.parse(localStorage.getItem('julian_sessions') || '[]'); } catch { return []; }
}
function saveSession(s) {
  const sessions = getSessions();
  sessions.unshift(s);
  localStorage.setItem('julian_sessions', JSON.stringify(sessions.slice(0, 50)));
}
function todayCount() {
  const today = new Date().toDateString();
  return getSessions().filter(s => new Date(s.time).toDateString() === today).length;
}

// ── Settings ──
function getSettings() {
  return {
    apiKey: document.getElementById('setting-apikey').value.trim(),
    city: document.getElementById('setting-city').value || 'Hong Kong',
    lat: parseFloat(document.getElementById('setting-lat').value) || 22.3193,
    lon: parseFloat(document.getElementById('setting-lon').value) || 114.1694,
    tz: document.getElementById('setting-tz').value || 'Asia/Hong_Kong'
  };
}

function saveSettings() {
  const s = getSettings();
  localStorage.setItem('julian_settings', JSON.stringify(s));
  const status = document.getElementById('apikey-status');
  if (s.apiKey) {
    status.textContent = 'Key saved locally.';
    status.style.color = 'var(--accent)';
  } else {
    status.textContent = 'No key set — sessions will not work.';
    status.style.color = 'var(--danger-soft)';
  }
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('julian_settings') || '{}');
    if (s.apiKey) document.getElementById('setting-apikey').value = s.apiKey;
    if (s.city) document.getElementById('setting-city').value = s.city;
    if (s.lat) document.getElementById('setting-lat').value = s.lat;
    if (s.lon) document.getElementById('setting-lon').value = s.lon;
    if (s.tz) document.getElementById('setting-tz').value = s.tz;
  } catch {}
}

document.getElementById('settings-panel').addEventListener('change', saveSettings);

// ── Context: time + weather ──
function getTimeOfDay(tz) {
  const hour = parseInt(new Intl.DateTimeFormat('en', { hour: 'numeric', hour12: false, timeZone: tz }).format(new Date()));
  if (hour >= 5 && hour < 12) return 'morning';
  if (hour >= 12 && hour < 17) return 'afternoon';
  if (hour >= 17 && hour < 21) return 'evening';
  return 'night';
}

function getDayName(tz) {
  return new Intl.DateTimeFormat('en', { weekday: 'long', timeZone: tz }).format(new Date());
}

async function fetchWeather(lat, lon) {
  if (weatherCache) return weatherCache;
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m&wind_speed_unit=mph`);
    const data = await res.json();
    const code = data.current.weather_code;
    const temp = Math.round(data.current.temperature_2m);
    let condition = 'clear';
    if (code === 0) condition = 'clear';
    else if (code <= 2) condition = 'partly cloudy';
    else if (code === 3) condition = 'overcast';
    else if (code <= 49) condition = 'foggy';
    else if (code <= 59) condition = 'drizzly';
    else if (code <= 69) condition = 'rainy';
    else if (code <= 79) condition = 'snowy';
    else if (code <= 82) condition = 'showery';
    else if (code <= 99) condition = 'stormy';
    weatherCache = { condition, temp };
    return weatherCache;
  } catch {
    return { condition: 'still', temp: null };
  }
}

async function buildContext() {
  const s = getSettings();
  const tod = getTimeOfDay(s.tz);
  const day = getDayName(s.tz);
  const w = await fetchWeather(s.lat, s.lon);
  contextString = `${day} ${tod} in ${s.city}. Weather: ${w.condition}${w.temp ? ', ' + w.temp + '°C' : ''}.`;

  // Human-readable line for home
  const lineMap = {
    morning: ['A quiet morning', 'The morning, still unhurried', 'Morning light'],
    afternoon: ['A slow afternoon', 'Mid-afternoon', 'The afternoon, half-spent'],
    evening: ['An evening settling in', 'The evening hour', 'Evening falling'],
    night: ['A late night', 'The stillness of night', 'Night, properly arrived']
  };
  const prefix = lineMap[tod][Math.floor(Math.random() * 3)];
  const weatherLine = w.condition === 'clear' ? 'clear skies' : w.condition;
  document.getElementById('context-line').textContent = `${prefix} in ${s.city} — ${weatherLine}.`;
}

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Mood selection ──
document.getElementById('mood-pre-row').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  moodPre = parseInt(btn.dataset.val);
  document.querySelectorAll('#mood-pre-row .mood-btn').forEach(b => b.classList.toggle('selected', b === btn));
  document.getElementById('join-btn').disabled = false;
  document.getElementById('join-btn').classList.add('ready');
});

document.getElementById('mood-post-row').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  moodPost = parseInt(btn.dataset.val);
  document.querySelectorAll('#mood-post-row .mood-btn').forEach(b => b.classList.toggle('selected', b === btn));
});

// ── Timer ──
function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function startTimer(seconds) {
  secondsLeft = seconds;
  const display = document.getElementById('timer');
  display.classList.remove('urgent');
  display.textContent = formatTime(secondsLeft);

  timerInterval = setInterval(() => {
    secondsLeft--;
    display.textContent = formatTime(secondsLeft);
    if (secondsLeft <= 30) display.classList.add('urgent');
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      if (!sessionExtended) {
        offerExtend();
      } else {
        endSession();
      }
    }
  }, 1000);
}

function offerExtend() {
  document.getElementById('extend-banner').classList.add('visible');
  document.getElementById('input-area').style.display = 'none';
}

document.getElementById('extend-yes').addEventListener('click', () => {
  sessionExtended = true;
  document.getElementById('extend-banner').classList.remove('visible');
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('timer').classList.remove('urgent');
  startTimer(120);
});

document.getElementById('extend-no').addEventListener('click', () => {
  endSession();
});

// ── Chat ──
function addMessage(sender, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg msg-${sender}`;
  div.innerHTML = `
    <div class="msg-sender">${sender === 'julian' ? 'Julian' : 'You'}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function callJulian(userMessage) {
  if (isJulianTyping) return;
  isJulianTyping = true;
  showTyping();

  if (userMessage) {
    conversationHistory.push({ role: 'user', content: userMessage });
  }

  const systemPrompt = `You are Julian — a gratitude session host named after Julian Barnes. Your character:
- Intellectual, reserved, emotionally controlled
- Quietly observant, with a sharp dry wit
- Never gushing, never clinical, never wellness-coach-y
- You share your own gratitudes the way Barnes writes: specific, unexpected, quietly moving
- You feel like a very good conversationalist, not an app
- Keep responses concise — 2-4 sentences max. This is a conversation, not an essay.
- Occasionally ask a single, light follow-up question
- Occasionally share a brief gratitude of your own
- Never use exclamation marks. Never say "wonderful", "amazing", "awesome", "fantastic"
- If this is the opening message, use this context naturally (not as a weather report): ${contextString}`;

  try {
    const apiKey = getSettings().apiKey;
    if (!apiKey) {
      hideTyping();
      addMessage('julian', 'No API key found. Please add your Anthropic API key in settings (⚙).');
      isJulianTyping = false;
      return;
    }
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    if (!response.ok) {
      const errMsg = data?.error?.message || `API error ${response.status}`;
      hideTyping();
      addMessage('julian', `(${errMsg})`);
      isJulianTyping = false;
      return;
    }
    const reply = data.content?.[0]?.text || 'A quiet moment.';
    hideTyping();
    addMessage('julian', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    addMessage('julian', `(Connection error: ${e.message})`);
  }
  isJulianTyping = false;
}

async function getClosingMessage() {
  const systemPrompt = `You are Julian — named after Julian Barnes. Write a closing reflection for this gratitude session.
Character: intellectual, reserved, dry wit, never gushing, never clinical.
Write 2-3 sentences maximum — a quiet synthesis of what was shared, in your voice. No bullet points. No exclamation marks. Make it feel like the last line of a good conversation.`;

  const sessionSummary = conversationHistory
    .filter(m => m.role === 'user')
    .map(m => m.content)
    .join('; ');

  try {
    const apiKey = getSettings().apiKey;
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `The user shared these gratitudes during our session: ${sessionSummary || 'They were quiet today.'}. Write your closing reflection.` }]
      })
    });
    const data = await response.json();
    return data.content?.[0]?.text || 'Something worth holding on to was shared here.';
  } catch {
    return 'A quiet session, which has its own kind of value.';
  }
}

// ── Start session ──
document.getElementById('join-btn').addEventListener('click', async () => {
  if (!moodPre) return;
  conversationHistory = [];
  sessionExtended = false;
  moodPost = 0;
  sessionStartTime = Date.now();
  sessionActive = true;

  document.getElementById('extend-banner').classList.remove('visible');
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('timer').classList.remove('urgent');

  showScreen('session');
  startTimer(180);

  // Julian opens
  conversationHistory.push({ role: 'user', content: 'Please open the session with a brief, characterful greeting.' });
  await callJulian(null);
});

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isJulianTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  await callJulian(text);
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── End session ──
async function endSession() {
  clearInterval(timerInterval);
  sessionActive = false;
  document.getElementById('extend-banner').classList.remove('visible');

  const duration = Math.round((Date.now() - sessionStartTime) / 1000);
  const closing = await getClosingMessage();

  document.getElementById('closing-text').textContent = closing;
  document.querySelectorAll('#mood-post-row .mood-btn').forEach(b => b.classList.remove('selected'));
  moodPost = 0;

  showScreen('closing');

  // Save session (will update with moodPost on return)
  const sessions = getSessions();
  const todaySessions = sessions.filter(s => new Date(s.time).toDateString() === new Date().toDateString()).length + 1;

  window._pendingSession = {
    time: new Date().toISOString(),
    sessionNum: todaySessions,
    duration,
    moodPre,
    moodPost: 0
  };

  updateCounter();
}

document.getElementById('end-btn').addEventListener('click', endSession);

// ── Return to home ──
document.getElementById('return-btn').addEventListener('click', () => {
  if (window._pendingSession) {
    window._pendingSession.moodPost = moodPost;
    saveSession(window._pendingSession);
    window._pendingSession = null;
  }

  moodPre = 0;
  document.querySelectorAll('#mood-pre-row .mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('join-btn').disabled = true;
  document.getElementById('join-btn').classList.remove('ready');
  weatherCache = null;
  buildContext();
  updateCounter();
  renderHistory();
  showScreen('home');
});

// ── Settings ──
document.getElementById('settings-toggle').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.toggle('open');
  document.getElementById('history-panel').classList.remove('open');
});

// ── History ──
document.getElementById('history-toggle').addEventListener('click', () => {
  document.getElementById('history-panel').classList.toggle('open');
  document.getElementById('settings-panel').classList.remove('open');
  renderHistory();
});

function renderHistory() {
  const sessions = getSessions();
  const list = document.getElementById('history-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="no-history">No sessions yet.</div>';
    return;
  }
  list.innerHTML = sessions.slice(0, 10).map(s => {
    const d = new Date(s.time);
    const time = d.toLocaleString('en', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const delta = s.moodPost && s.moodPre ? s.moodPost - s.moodPre : null;
    const deltaClass = delta === null ? '' : delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-neu';
    const deltaStr = delta === null ? '—' : delta > 0 ? `+${delta}` : `${delta}`;
    const dur = Math.round(s.duration / 60);
    return `<div class="history-item">
      <div>
        <div style="font-size:12px;color:var(--ink-muted)">${time}</div>
        <div style="font-size:13px;">#${s.sessionNum} today · ${dur}m</div>
      </div>
      <div class="history-delta ${deltaClass}">${deltaStr}</div>
    </div>`;
  }).join('');
}

function updateCounter() {
  const count = todayCount();
  const el = document.getElementById('session-counter');
  el.textContent = count > 0 ? `Today: ${count} session${count !== 1 ? 's' : ''}` : '';
}

// Close panels on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#settings-panel') && !e.target.closest('#settings-toggle')) {
    document.getElementById('settings-panel').classList.remove('open');
  }
  if (!e.target.closest('#history-panel') && !e.target.closest('#history-toggle')) {
    document.getElementById('history-panel').classList.remove('open');
  }
});

// ── Init ──
loadSettings();
buildContext();
updateCounter();
renderHistory();
</script>
