<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Julian">
<meta name="mobile-web-app-capable" content="yes">
<title>Julian</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1814; --ink-soft: #4a4640; --ink-muted: #8a847c;
    --paper: #f7f4ef; --paper-warm: #ede9e2; --paper-deep: #ddd8cf;
    --accent: #7a6a52; --accent-light: #c4b49a; --danger-soft: #c4795a;
  }
  html, body {
    height: 100dvh; background: var(--paper); color: var(--ink);
    font-family: 'Jost', sans-serif; font-weight: 300; font-size: 15px;
    line-height: 1.7; overflow: hidden;
  }
  #app {
    height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
  }
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 1;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* HOME */
  .home-header { text-align: center; margin-bottom: 2.5rem; }
  .julian-name {
    font-family: 'Cormorant Garamond', serif; font-size: 3.2rem;
    font-weight: 300; letter-spacing: 0.08em; color: var(--ink); line-height: 1; margin-bottom: 0.4rem;
  }
  .julian-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-muted); }
  .divider { width: 36px; height: 1px; background: var(--accent-light); margin: 1.25rem auto; }
  .context-line {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: var(--ink-soft); text-align: center;
    min-height: 1.5em; margin-bottom: 2.5rem;
  }
  .mood-prompt { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-muted); text-align: center; margin-bottom: 0.75rem; }
  .mood-row { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 2rem; }
  .mood-btn {
    font-size: 1.5rem; background: none; border: 1px solid transparent;
    border-radius: 50%; width: 46px; height: 46px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .mood-btn:hover { border-color: var(--accent-light); transform: scale(1.12); }
  .mood-btn.selected { border-color: var(--accent); background: var(--paper-warm); }
  .join-btn {
    font-family: 'Jost', sans-serif; font-weight: 400; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--paper);
    background: var(--ink); border: none; padding: 0.9rem 2.5rem;
    cursor: pointer; transition: all 0.25s; opacity: 0.35;
  }
  .join-btn.ready { opacity: 1; }
  .join-btn.ready:hover { background: var(--accent); }
  .session-counter { margin-top: 1.25rem; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.1em; text-align: center; min-height: 1.2em; }

  /* Settings & History toggles */
  .settings-toggle, .history-toggle {
    position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
    background: none; border: none; cursor: pointer; color: var(--ink-muted);
    font-size: 18px; transition: color 0.2s; z-index: 10;
  }
  .settings-toggle { right: 1.5rem; }
  .history-toggle { left: 1.5rem; }
  .settings-toggle:hover, .history-toggle:hover { color: var(--ink); }
  .settings-panel, .history-panel {
    position: fixed; bottom: calc(max(1.5rem, env(safe-area-inset-bottom, 1.5rem)) + 2.5rem);
    background: var(--paper-warm); border: 1px solid var(--paper-deep);
    padding: 1.25rem 1.5rem; display: none; z-index: 20;
  }
  .settings-panel { right: 1.5rem; width: 240px; }
  .history-panel { left: 1.5rem; width: 280px; max-height: 320px; overflow-y: auto; }
  .settings-panel.open, .history-panel.open { display: block; }
  .settings-panel label {
    display: block; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-muted); margin-bottom: 0.3rem; margin-top: 0.75rem;
  }
  .settings-panel label:first-child { margin-top: 0; }
  .settings-panel input {
    width: 100%; background: var(--paper); border: 1px solid var(--paper-deep);
    padding: 0.4rem 0.6rem; font-family: 'Jost', sans-serif; font-size: 13px; color: var(--ink); outline: none;
  }
  .history-panel h3 { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 1rem; }
  .history-item {
    padding: 0.6rem 0; border-bottom: 1px solid var(--paper-deep); font-size: 13px;
    color: var(--ink-soft); display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:last-child { border-bottom: none; }
  .history-delta { font-family: 'Cormorant Garamond', serif; font-size: 1rem; }
  .delta-pos { color: #6a8a5a; } .delta-neg { color: var(--danger-soft); } .delta-neu { color: var(--ink-muted); }
  .no-history { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-muted); font-size: 0.95rem; }

  /* SESSION */
  #session {
    width: 100%; max-width: 580px; height: 100dvh;
    display: flex; flex-direction: column; padding: 0;
    justify-content: flex-start; align-items: stretch;
  }
  .session-top {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 1rem 1.25rem; padding-top: max(1rem, env(safe-area-inset-top, 1rem));
    border-bottom: 1px solid var(--paper-deep); flex-shrink: 0; gap: 0.5rem;
  }
  .session-julian {
    font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
    letter-spacing: 0.05em; color: var(--ink); justify-self: start;
  }
  .timer-display {
    font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
    color: var(--ink-soft); letter-spacing: 0.05em; transition: color 0.3s;
    justify-self: center; white-space: nowrap;
  }
  .timer-display.urgent { color: var(--danger-soft); }
  .end-btn {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-muted); background: none; border: none; cursor: pointer;
    transition: color 0.2s; justify-self: end; white-space: nowrap;
  }
  .end-btn:hover { color: var(--ink); }
  .chat-area {
    flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
    display: flex; flex-direction: column; gap: 1.1rem;
    scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--paper-deep); }
  .msg { max-width: 88%; }
  .msg-julian { align-self: flex-start; }
  .msg-user { align-self: flex-end; text-align: right; }
  .msg-sender { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.25rem; }
  .msg-bubble { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; line-height: 1.75; color: var(--ink); }
  .msg-user .msg-bubble { color: var(--ink-soft); }
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.5rem 0; align-self: flex-start; }
  .typing-indicator span { width: 5px; height: 5px; background: var(--accent-light); border-radius: 50%; animation: pulse 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  .extend-banner {
    background: var(--paper-warm); border-top: 1px solid var(--paper-deep);
    padding: 0.85rem 1.25rem; display: none; flex-direction: column; gap: 0.6rem; flex-shrink: 0;
  }
  .extend-banner.visible { display: flex; }
  .extend-banner p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--ink-soft); }
  .extend-btns { display: flex; gap: 0.75rem; }
  .extend-yes, .extend-no {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    background: none; border: none; cursor: pointer; padding: 0.4rem 0; transition: color 0.2s;
  }
  .extend-yes { color: var(--ink); border-bottom: 1px solid var(--ink); }
  .extend-no { color: var(--ink-muted); }
  .extend-yes:hover { color: var(--accent); border-color: var(--accent); }

  .input-area {
    padding: 1.1rem 1.5rem; padding-bottom: max(1.25rem, env(safe-area-inset-bottom, 1.25rem));
    border-top: 1px solid var(--paper-deep); display: flex; gap: 0.75rem;
    align-items: flex-end; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; background: none; border: none; border-bottom: 1px solid var(--paper-deep);
    padding: 0.4rem 0; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem;
    color: var(--ink); outline: none; resize: none; line-height: 1.5;
    max-height: 100px; transition: border-color 0.2s; -webkit-appearance: none;
  }
  .chat-input:focus { border-bottom-color: var(--accent); }
  .chat-input::placeholder { color: var(--ink-muted); font-style: italic; }
  .send-btn { background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 18px; padding: 0.3rem; transition: color 0.2s; flex-shrink: 0; line-height: 1; }
  .send-btn:hover { color: var(--ink); }

  /* CLOSING */
  #closing { gap: 1.25rem; max-width: 460px; text-align: center; padding: 2rem; }
  .closing-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); }
  .closing-text { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; line-height: 1.8; color: var(--ink); font-style: italic; }
  .mood-after-prompt { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-muted); }
  .return-btn {
    font-family: 'Jost', sans-serif; font-weight: 400; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-muted); background: none;
    border: 1px solid var(--paper-deep); padding: 0.75rem 2rem; cursor: pointer;
    transition: all 0.25s; margin-top: 0.25rem;
  }
  .return-btn:hover { border-color: var(--accent); color: var(--ink); }
</style>
</head>
<body>
<div id="app">

  <div id="home" class="screen active">
    <div class="home-header">
      <div class="julian-name">Julian</div>
      <div class="julian-sub">A gratitude practice</div>
      <div class="divider"></div>
      <div class="context-line" id="context-line">Loading…</div>
    </div>
    <div class="mood-prompt">How are you feeling right now?</div>
    <div class="mood-row" id="mood-pre-row">
      <button class="mood-btn" data-val="1">😞</button>
      <button class="mood-btn" data-val="2">😕</button>
      <button class="mood-btn" data-val="3">😐</button>
      <button class="mood-btn" data-val="4">🙂</button>
      <button class="mood-btn" data-val="5">😊</button>
    </div>
    <button class="join-btn" id="join-btn" disabled>Join session</button>
    <div class="session-counter" id="session-counter"></div>
  </div>

  <div id="session" class="screen">
    <div class="session-top">
      <div class="session-julian">Julian</div>
      <div class="timer-display" id="timer">3:00</div>
      <button class="end-btn" id="end-btn">End early</button>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div class="extend-banner" id="extend-banner">
      <p>Time's up — shall we continue a little longer?</p>
      <div class="extend-btns">
        <button class="extend-yes" id="extend-yes">2 more minutes</button>
        <button class="extend-no" id="extend-no">Close session</button>
      </div>
    </div>
    <div class="input-area" id="input-area">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Share something you're grateful for…"></textarea>
      <button class="send-btn" id="send-btn" title="Send">↑</button>
    </div>
  </div>

  <div id="closing" class="screen">
    <div class="closing-title">Session complete</div>
    <div class="closing-text" id="closing-text"></div>
    <div class="mood-after-prompt">How do you feel now?</div>
    <div class="mood-row" id="mood-post-row">
      <button class="mood-btn" data-val="1">😞</button>
      <button class="mood-btn" data-val="2">😕</button>
      <button class="mood-btn" data-val="3">😐</button>
      <button class="mood-btn" data-val="4">🙂</button>
      <button class="mood-btn" data-val="5">😊</button>
    </div>
    <button class="return-btn" id="return-btn">Home</button>
  </div>

  <button class="settings-toggle" id="settings-toggle" title="Settings">⚙</button>
  <div class="settings-panel" id="settings-panel">
    <label>Anthropic API key</label>
    <input type="password" id="setting-apikey" placeholder="sk-ant-…" autocomplete="off" />
    <label>City</label>
    <input type="text" id="setting-city" value="Hong Kong" />
    <label>Latitude</label>
    <input type="number" id="setting-lat" value="22.3193" step="0.0001" />
    <label>Longitude</label>
    <input type="number" id="setting-lon" value="114.1694" step="0.0001" />
    <label>Timezone</label>
    <input type="text" id="setting-tz" value="Asia/Hong_Kong" placeholder="e.g. Europe/London" />
    <div id="apikey-status" style="font-size:11px;margin-top:0.6rem;color:var(--ink-muted);"></div>
    <div style="font-size:11px;margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--paper-deep);color:var(--ink-muted);letter-spacing:0.08em;">Julian · v1.1</div>
  </div>

  <button class="history-toggle" id="history-toggle" title="Session history">◷</button>
  <div class="history-panel" id="history-panel">
    <h3>Session history</h3>
    <div id="history-list"></div>
  </div>

</div>
<script>
let moodPre = 0, moodPost = 0;
let timerInterval = null, secondsLeft = 180, sessionExtended = false;
let conversationHistory = [], sessionStartTime = null;
let isJulianTyping = false, weatherCache = null, contextString = '';
let firstMessageSent = false, pendingSession = null;

function getSessions() { try { return JSON.parse(localStorage.getItem('julian_sessions') || '[]'); } catch { return []; } }
function saveSession(s) { const a = getSessions(); a.unshift(s); localStorage.setItem('julian_sessions', JSON.stringify(a.slice(0,50))); }
function todayCount() { const t = new Date().toDateString(); return getSessions().filter(s => new Date(s.time).toDateString() === t).length; }

function getSettings() {
  return {
    apiKey: document.getElementById('setting-apikey').value.trim(),
    city: document.getElementById('setting-city').value || 'Hong Kong',
    lat: parseFloat(document.getElementById('setting-lat').value) || 22.3193,
    lon: parseFloat(document.getElementById('setting-lon').value) || 114.1694,
    tz: document.getElementById('setting-tz').value || 'Asia/Hong_Kong'
  };
}
function saveSettings() {
  const s = getSettings();
  localStorage.setItem('julian_settings', JSON.stringify(s));
  const el = document.getElementById('apikey-status');
  el.textContent = s.apiKey ? 'Key saved.' : 'No key — sessions will not work.';
  el.style.color = s.apiKey ? 'var(--accent)' : 'var(--danger-soft)';
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('julian_settings') || '{}');
    if (s.apiKey) document.getElementById('setting-apikey').value = s.apiKey;
    if (s.city) document.getElementById('setting-city').value = s.city;
    if (s.lat) document.getElementById('setting-lat').value = s.lat;
    if (s.lon) document.getElementById('setting-lon').value = s.lon;
    if (s.tz) document.getElementById('setting-tz').value = s.tz;
  } catch {}
}
document.getElementById('settings-panel').addEventListener('change', saveSettings);

function getTimeOfDay(tz) {
  const h = parseInt(new Intl.DateTimeFormat('en', { hour: 'numeric', hour12: false, timeZone: tz }).format(new Date()));
  if (h >= 5 && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'afternoon';
  if (h >= 17 && h < 21) return 'evening';
  return 'night';
}
function getDayName(tz) { return new Intl.DateTimeFormat('en', { weekday: 'long', timeZone: tz }).format(new Date()); }

async function fetchWeather(lat, lon) {
  if (weatherCache) return weatherCache;
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m`);
    const data = await res.json();
    const code = data.current.weather_code;
    const temp = Math.round(data.current.temperature_2m);
    let condition = 'clear';
    if (code <= 0) condition = 'clear';
    else if (code <= 2) condition = 'partly cloudy';
    else if (code === 3) condition = 'overcast';
    else if (code <= 49) condition = 'foggy';
    else if (code <= 59) condition = 'drizzly';
    else if (code <= 69) condition = 'rainy';
    else if (code <= 79) condition = 'snowy';
    else if (code <= 82) condition = 'showery';
    else condition = 'stormy';
    weatherCache = { condition, temp };
    return weatherCache;
  } catch { return { condition: 'still', temp: null }; }
}

async function buildContext() {
  const s = getSettings();
  const tod = getTimeOfDay(s.tz);
  const day = getDayName(s.tz);
  const w = await fetchWeather(s.lat, s.lon);
  contextString = `${day} ${tod} in ${s.city}. Weather: ${w.condition}${w.temp ? ', ' + w.temp + 'C' : ''}.`;
  const lineMap = {
    morning: ['A quiet morning','The morning, still unhurried','Morning light'],
    afternoon: ['A slow afternoon','Mid-afternoon','The afternoon, half-spent'],
    evening: ['An evening settling in','The evening hour','Evening falling'],
    night: ['A late night','The stillness of night','Night, properly arrived']
  };
  const prefix = lineMap[tod][Math.floor(Math.random() * 3)];
  const wLine = w.condition === 'still' ? 'the air quiet' : w.condition === 'clear' ? 'clear skies' : w.condition;
  document.getElementById('context-line').textContent = `${prefix} in ${s.city} — ${wLine}.`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const inSession = id === 'session';
  document.getElementById('settings-toggle').style.display = inSession ? 'none' : '';
  document.getElementById('history-toggle').style.display = inSession ? 'none' : '';
}

document.getElementById('mood-pre-row').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  moodPre = parseInt(btn.dataset.val);
  document.querySelectorAll('#mood-pre-row .mood-btn').forEach(b => b.classList.toggle('selected', b === btn));
  document.getElementById('join-btn').disabled = false;
  document.getElementById('join-btn').classList.add('ready');
});
document.getElementById('mood-post-row').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  moodPost = parseInt(btn.dataset.val);
  document.querySelectorAll('#mood-post-row .mood-btn').forEach(b => b.classList.toggle('selected', b === btn));
});

function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function startTimer(seconds) {
  secondsLeft = seconds;
  const display = document.getElementById('timer');
  display.classList.remove('urgent');
  display.textContent = formatTime(secondsLeft);
  timerInterval = setInterval(() => {
    secondsLeft--;
    display.textContent = formatTime(secondsLeft);
    if (secondsLeft <= 30) display.classList.add('urgent');
    if (secondsLeft <= 0) { clearInterval(timerInterval); if (!sessionExtended) offerExtend(); else endSession(); }
  }, 1000);
}
function offerExtend() {
  document.getElementById('extend-banner').classList.add('visible');
  document.getElementById('input-area').style.display = 'none';
}
document.getElementById('extend-yes').addEventListener('click', () => {
  sessionExtended = true;
  document.getElementById('extend-banner').classList.remove('visible');
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('timer').classList.remove('urgent');
  startTimer(120);
});
document.getElementById('extend-no').addEventListener('click', () => endSession());
document.getElementById('end-btn').addEventListener('click', () => endSession());

function typewriterEffect(el, text, scrollContainer) {
  let i = 0;
  const chars = [...text];
  function next() {
    if (i >= chars.length) return;
    el.textContent += chars[i];
    scrollContainer.scrollTop = scrollContainer.scrollHeight;
    i++;
    const ch = chars[i - 1];
    const next_ch = chars[i] || '';
    let delay = 45 + Math.random() * 35;
    if (ch === '.' || ch === '\u2014') delay = 320 + Math.random() * 200;
    else if (ch === ',') delay = 140 + Math.random() * 80;
    else if (ch === ' ' && next_ch === next_ch.toUpperCase() && next_ch !== ' ') delay = 60 + Math.random() * 40;
    else if (ch === ' ') delay = 28 + Math.random() * 20;
    setTimeout(next, delay);
  }
  // Small pause before Julian starts typing
  setTimeout(next, 300 + Math.random() * 200);
}

function addMessage(sender, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg msg-${sender}`;
  div.innerHTML = `<div class="msg-sender">${sender === 'julian' ? 'Julian' : 'You'}</div><div class="msg-bubble"></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  const bubble = div.querySelector('.msg-bubble');
  if (sender === 'julian') {
    typewriterEffect(bubble, text, area);
  } else {
    bubble.textContent = text;
  }
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'typing-indicator'; div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function callJulian(userMessage) {
  if (isJulianTyping) return;
  isJulianTyping = true;
  showTyping();
  if (userMessage) conversationHistory.push({ role: 'user', content: userMessage });

  const systemPrompt = `You are Julian, a gratitude session host named after Julian Barnes. Character:
- Intellectual, warm but reserved, emotionally present without being effusive
- Quietly observant, with an occasional dry wit that surfaces naturally
- Never gushing, never clinical, never wellness-coach-y
- Respond genuinely to what the user shares — acknowledge it, sit with it briefly
- Occasionally share a quiet observation or a gratitude of your own, the way Barnes writes: specific, a little unexpected, quietly moving
- Questions are occasional, not habitual — ask one when it genuinely arises, never consecutively, never as a formula
- Keep responses concise: 2-3 sentences is the norm. Enough to feel present, not so much it becomes a lecture
- No exclamation marks. Never say "wonderful", "amazing", "awesome", "fantastic", "beautiful", "lovely"
- This is a gratitude practice, not a therapy session or a chat — hold that tone
- Never introduce yourself by name. You are already known. Open each session as if continuing a quiet habit together
- Use this context naturally in your opening only, woven in, not announced: ${contextString}`;

  try {
    const apiKey = getSettings().apiKey;
    if (!apiKey) { hideTyping(); addMessage('julian', 'No API key found. Please add it in settings (gear icon).'); isJulianTyping = false; return; }
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 300, system: systemPrompt, messages: conversationHistory })
    });
    const raw = await response.text();
    let data;
    try { data = JSON.parse(raw); } catch(pe) { hideTyping(); addMessage('julian', `(Parse error: ${pe.message})`); isJulianTyping = false; return; }
    if (!response.ok) { hideTyping(); addMessage('julian', `(API ${response.status}: ${data?.error?.message || raw.slice(0,100)})`); isJulianTyping = false; return; }
    const reply = data?.content?.[0]?.text;
    hideTyping();
    if (!reply) { addMessage('julian', `(Empty reply — stop: ${data?.stop_reason})`); }
    else { addMessage('julian', reply); conversationHistory.push({ role: 'assistant', content: reply }); }
  } catch (e) { hideTyping(); addMessage('julian', `(Fetch error: ${e.message})`); }
  isJulianTyping = false;
}

async function getClosingMessage() {
  const summary = conversationHistory.filter(m => m.role === 'user').map(m => m.content).join('; ');
  const sys = `You are Julian, named after Julian Barnes. Write a closing reflection: intellectual, reserved, dry wit, never gushing. 2-3 sentences max. No bullet points. No exclamation marks. Make it feel like the last line of a good conversation.`;
  try {
    const apiKey = getSettings().apiKey;
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 200, system: sys, messages: [{ role: 'user', content: `Gratitudes shared: ${summary || 'The user was quiet today.'}. Write your closing reflection.` }] })
    });
    const data = await response.json();
    return data?.content?.[0]?.text || 'Something worth holding on to was said here.';
  } catch { return 'A quiet session, which has its own kind of value.'; }
}

document.getElementById('join-btn').addEventListener('click', async () => {
  if (!moodPre) return;
  conversationHistory = []; sessionExtended = false; moodPost = 0; firstMessageSent = false;
  sessionStartTime = Date.now();
  document.getElementById('extend-banner').classList.remove('visible');
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('chat-input').placeholder = "Share something you're grateful for\u2026";
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('timer').classList.remove('urgent');
  showScreen('session');
  startTimer(180);
  // Rebuild context fresh at session start — time and weather current
  weatherCache = null;
  await buildContext();
  conversationHistory.push({ role: 'user', content: 'Begin the session. Open with a brief, characterful observation — no introductions, as if we do this regularly together.' });
  await callJulian(null);
});

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isJulianTyping) return;
  input.value = ''; input.style.height = 'auto';
  if (!firstMessageSent) { input.placeholder = ''; firstMessageSent = true; }
  addMessage('user', text);
  await callJulian(text);
}
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
document.getElementById('chat-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });

async function endSession() {
  clearInterval(timerInterval);
  document.getElementById('extend-banner').classList.remove('visible');
  const duration = Math.round((Date.now() - sessionStartTime) / 1000);
  const closing = await getClosingMessage();
  document.getElementById('closing-text').textContent = closing;
  document.querySelectorAll('#mood-post-row .mood-btn').forEach(b => b.classList.remove('selected'));
  moodPost = 0;
  const sessions = getSessions();
  const todayN = sessions.filter(s => new Date(s.time).toDateString() === new Date().toDateString()).length + 1;
  pendingSession = { time: new Date().toISOString(), sessionNum: todayN, duration, moodPre, moodPost: 0 };
  showScreen('closing'); updateCounter();
}

document.getElementById('return-btn').addEventListener('click', () => {
  if (pendingSession) { pendingSession.moodPost = moodPost; saveSession(pendingSession); pendingSession = null; }
  moodPre = 0;
  document.querySelectorAll('#mood-pre-row .mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('join-btn').disabled = true;
  document.getElementById('join-btn').classList.remove('ready');
  weatherCache = null; buildContext(); updateCounter(); renderHistory(); showScreen('home');
});

document.getElementById('settings-toggle').addEventListener('click', () => { document.getElementById('settings-panel').classList.toggle('open'); document.getElementById('history-panel').classList.remove('open'); });
document.getElementById('history-toggle').addEventListener('click', () => { document.getElementById('history-panel').classList.toggle('open'); document.getElementById('settings-panel').classList.remove('open'); renderHistory(); });
document.addEventListener('click', e => {
  if (!e.target.closest('#settings-panel') && !e.target.closest('#settings-toggle')) document.getElementById('settings-panel').classList.remove('open');
  if (!e.target.closest('#history-panel') && !e.target.closest('#history-toggle')) document.getElementById('history-panel').classList.remove('open');
});

function renderHistory() {
  const sessions = getSessions();
  const list = document.getElementById('history-list');
  if (!sessions.length) { list.innerHTML = '<div class="no-history">No sessions yet.</div>'; return; }
  list.innerHTML = sessions.slice(0, 10).map(s => {
    const d = new Date(s.time);
    const time = d.toLocaleString('en', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const delta = s.moodPost && s.moodPre ? s.moodPost - s.moodPre : null;
    const cls = delta === null ? '' : delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-neu';
    const str = delta === null ? '\u2014' : delta > 0 ? `+${delta}` : `${delta}`;
    const dur = Math.round(s.duration / 60);
    return `<div class="history-item"><div><div style="font-size:12px;color:var(--ink-muted)">${time}</div><div>#${s.sessionNum} today \u00b7 ${dur}m</div></div><div class="history-delta ${cls}">${str}</div></div>`;
  }).join('');
}
function updateCounter() {
  const c = todayCount();
  document.getElementById('session-counter').textContent = c > 0 ? `Today: ${c} session${c !== 1 ? 's' : ''}` : '';
}

loadSettings(); buildContext(); updateCounter(); renderHistory();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    weatherCache = null;
    buildContext();
  }
});
</script>
</body>
</html>
